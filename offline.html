<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're offline — PFX to PEM Converter</title>
    <meta name="theme-color" content="#1e40af">
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon">
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: #fff;
            text-align: center;
        }
        .card {
            max-width: 32rem;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 2.5rem 2rem;
        }
        .icon {
            width: 4rem;
            height: 4rem;
            margin: 0 auto 1.25rem;
            display: block;
        }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        p { font-size: 1rem; line-height: 1.6; opacity: 0.9; margin-bottom: 1.5rem; }
        button {
            font: inherit;
            font-weight: 700;
            color: #1e40af;
            background: #fff;
            border: 0;
            border-radius: 9999px;
            padding: 0.75rem 1.75rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: #fef9c3; }
        button:focus-visible { outline: 3px solid #fff; outline-offset: 3px; }
        @media (prefers-reduced-motion: reduce) {
            * { transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <main class="card">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M1 1l22 22"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
        <h1>You're offline</h1>
        <p>
            This converter needs an internet connection to process your file securely on the server.
            Reconnect and try again — your file is never uploaded until you submit it.
        </p>
        <button type="button" onclick="location.reload()">Try again</button>
    </main>
</body>
</html>
