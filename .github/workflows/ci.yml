name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl, zip
          coverage: none

      - name: Lint PHP files
        run: |
          find . -path ./node_modules -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: |
          node --check js/app.js
          node --check sw.js

      - name: Build CSS
        run: npm run build

      - name: Verify CSS built
        run: test -s css/app.css

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: openssl, zip
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build CSS
        run: |
          npm ci
          npm run build

      - name: Start PHP server
        run: php -S 127.0.0.1:8080 -t . &> /tmp/php-server.log &

      - name: Wait for server
        run: npx --yes wait-on http://127.0.0.1:8080/ --timeout 30000

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:8080/
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
