name: Bug report
description: Report something that isn't working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! ⚠️ **Never paste a real private key, certificate, or PFX password here.**
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I upload a .pfx and enter the password, ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Upload ...
        3. Click ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser / OS, and whether you used the live site or a self-hosted copy.
      placeholder: Chrome 124 on Windows 11, live site
    validations:
      required: false
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Any errors from the browser console (especially CSP violations). Do not include sensitive data.
    validations:
      required: false
